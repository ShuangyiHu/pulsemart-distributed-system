  summarizer-db:
    image: postgres:16-alpine
    container_name: summarizer-db
    networks: [pulsemart-net]
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: summarizerdb
      POSTGRES_USER: summarizeruser
      POSTGRES_PASSWORD: summarizerpass
    volumes:
      - summarizer-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summarizeruser -d summarizerdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-summarizer:
    build:
      context: ..
      dockerfile: ai-summarizer/Dockerfile
    container_name: ai-summarizer
    networks: [pulsemart-net]
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://summarizer-db:5432/summarizerdb
      SPRING_DATASOURCE_USERNAME: summarizeruser
      SPRING_DATASOURCE_PASSWORD: summarizerpass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
    depends_on:
      summarizer-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

volumes:
  order-db-data:
  inventory-db-data:
  payment-db-data:
  summarizer-db-data:
  grafana-data:
