server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/orders/**

        - id: ai-summarizer
          uri: ${AI_SUMMARIZER_URL:http://localhost:8088}
          predicates:
            - Path=/summaries/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:3001"
            allowedMethods: "*"
            allowedHeaders: "*"
            exposedHeaders: "Authorization"
            allowCredentials: true

jwt:
  public-key: classpath:keys/app.pub
  private-key: classpath:keys/app.key

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    com.pulsemart: DEBUG
    org.springframework.cloud.gateway: INFO
