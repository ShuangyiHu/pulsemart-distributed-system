server:
  port: 8088

spring:
  application:
    name: ai-summarizer

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/summarizerdb}
    username: ${SPRING_DATASOURCE_USERNAME:summarizeruser}
    password: ${SPRING_DATASOURCE_PASSWORD:summarizerpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
  base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}

logging:
  level:
    com.pulsemart: DEBUG
    org.springframework.kafka: INFO
